<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>컴포넌트연습</title>

    <style> 

    /*기본설정*/

    *{
      margin:0px; padding:0px; 
    }
    
    
    
    /*상단영역*/

    header{
      width:100%; 
      height:54px;     
      background:#2B3467;
      position:fixed;
      left:0px;
      top:0px;  
    }

    h1#logo{
      width:60px; 
      height:40px; 
      position:absolute; 
      left:16px; 
      top:4px;  
      font:bold 18px/30px 'verdana';
      color:white;
    }    

    /*컨텐츠영역*/

    section#contents{
        width:100%;       
        height:100vh;        
        padding:120px 16px; 
        box-sizing:border-box;           
    }

    h2#contents_title{
        font-size:24px;         
        text-align:center;
        color:#2B3467;
        margin-bottom:12px; 
       

    }

    p#contents_text{
        font-size:14px; 
        text-align:center;
        color:#2B3467;
    }

    /*하단영역*/

    footer{
        width:100%; 
        height:54px; 
        float:left; 
        background:#2B3467;  
        padding:0px 20px; 
        box-sizing:border-box;
        position:fixed;
        left:0px;
        bottom:0px; 
    }

    p#copyright{
        font-size:12px;
        line-height:48px; 
        color:rgb(224, 224, 224);
        text-align:center;
    }

    </style>
</head>
<body>

    <header>
        <h1 id="logo">
           <img src="./images/logo.svg" alt="">
        </h1>      
    </header>   
    

    <section id="contents">         

        <h2 id="contents_title">
            Create React App
        </h2>
        <p id="contents_text">
            Set up a modern web app by running one command.
        </p>

    </section>


    <footer>
        <p id="copyright">Copyright © 2022 Facebook, Inc.</p>
    </footer>
    
</body>
</html>
