<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>scrollTrigger()_3_부모요소와객체동기화(단일자식객체)</title>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js'></script>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/ScrollTrigger.min.js'></script> 
    <!-- gsap scrollTrigger 라이브러리 적용 (cdn.js 검색시 gsap 항목으로 들어가서 검색)-->   

    <style>
        *{
            margin:0px;
            padding:0px; 
        }

        body,html{
            height:100%; 
        }

        /*스크롤바 숨기기 - 스크롤은 작동 */

        /*
        body{
            -ms-overflow-style: none;  
        }        

        body::-webkit-scrollbar {  
            display: none; 
        }
        */

        div#contents_1{
            width:100%;
            height:100%;
           
        }

        div#contents_2{
            width:100%;
            height:100%;            
            position:relative;
            left:0px; 
            top:0px; 
            background:#eeeeee;   
            
        }

        div#contents_2.activate{
            background:#5D3891;
        }
       
        div.box{
            width:100px; 
            height:100px; 
            color:white;  
            text-align:center;        
            line-height:100px;           
            background:#cccccc;                 
        }

        div.box.activate{
            background:#5D3891;
        }        

        div#box_1{
            position:absolute;
            left:0px;
            top:160px;
        }
       
        

        div#contents_3{
            width:100%;
            height:200%;
            
        }


    </style>

<script>    

    /*   
    
    scrollTrigger() 

    - 윈도우 스크롤 이벤트에 따라 특정요소에 에니메이션을 적용할때 특정 스크롤 지점에서 특정요소 위치에 따라 에니메이션을 실행시켜 주는 라이브러리 
    - 일일히 윈도우 스크롤값을 계산하여 에니메이션 실행시점을 적용하는것이 아니라 화면상(viewport)에서 속성값에 따라 직관적으로 적용
    - toggleActions 속성값을 이용하여 스크롤 이벤트에 따라 에니메이션을 다양하게 전환 시키면서 적용가능 ( none, play, pause, resume, reverse, restart, reset, complete)
    - scrub 속성값을 이용하면 에니메이션이 적용되는 화면상의 범위와 에니메이션 자체의 적용되는 시간을 동기화 시킬수있다. (true 값적용 )
    - pin 속성값을 사용하여 특정구간에서 해당요소를 스크롤되지 않게 고정 시킬수 있다. 
     (css position:sticky 속성값과 같은 개념 - sticky 속성에서 고정되는 시간은 부모요소의 높이값을 인위적으로 적용해야하지만, pin 속성은 부모의 높이값 조절없이 end 속성으로 조절가능)

        
    
    작업개요 3  - 부모요소와 특정 한개의 자식객체의 에니메이션을 동기화하여 스크롤되는 시점을 정확히 맞춤 

    - 특정 자식객체의 gsap.to() 에니메이션 구문안에서 trigger 대상을 부모요소로 지정 
    - 부모요소의 스크롤 종료시점을 특정 자식객체의 에니메이션길와 같게 지정하여 그 자식객체의 에니메이션과 하나로 동기화     
    - 스크롤 하다가 특정시점에서 가로스크롤을 적용하고 가로스크롤 길이에 맞추어 다시 아래로 스크롤하는 방식의 원리 
    - 하나의 부모요소에 1개또는 여러객체의 에니메이션 동기화 가능  

    */    

    












    

</script>


</head>
<body>
   

        <div id="contents_1">

           

        </div>

        <div id="contents_2">

            <div class="box" id="box_1">
                box_1
            </div>        
          
          

        </div>


        <div id="contents_3">





        </div>






        

    

    
    
</body>
</html>
