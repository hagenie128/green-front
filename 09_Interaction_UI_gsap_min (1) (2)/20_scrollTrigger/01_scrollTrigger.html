<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>scrollTrigger()_1_객체각각제어</title>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js'></script>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/ScrollTrigger.min.js'></script> 
    <!-- gsap scrollTrigger 라이브러리 적용 (cdn.js 검색시 gsap 항목으로 들어가서 검색)-->   

    <style>

        *{
            margin:0px;
            padding:0px; 
        }

        body,html{
            height:100%; 
        }

        /*스크롤바 숨기기 - 스크롤은 작동 */

        /*
        body{
            -ms-overflow-style: none;  
        }        

        body::-webkit-scrollbar {  
            display: none; 
        }
        */

        div#contents_1{
            width:100%;
            height:100%;
           
        }

        div#contents_2{
            width:100%;
            height:100%;           
            position:relative;
            left:0px; 
            top:0px;     
           
        }
       
        div.box{
            width:100px; 
            height:100px; 
            color:white;  
            text-align:center;        
            line-height:100px;           
            background:#cccccc;
                
        }       


        div.box.activate{
            background:#5D3891;
        }

        div#box_1{
            position:absolute;
            left:0px;
            top:160px;
        }
       


    </style>

<script>

    /*

    scrollTrigger() 

    - 윈도우 스크롤 이벤트에 따라 특정요소에 에니메이션을 적용할때 특정 스크롤 지점에서 특정요소 위치에 따라 에니메이션을 실행시켜 주는 라이브러리 
    - 일일히 윈도우 스크롤값을 계산하여 에니메이션 실행시점을 적용하는것이 아니라 화면상(viewport)에서 속성값에 따라 직관적으로 적용
    - toggleActions 속성값을 이용하여 스크롤 이벤트에 따라 에니메이션을 다양하게 전환 시키면서 적용가능 ( none, play, pause, resume, reverse, restart, reset, complete)
    - scrub 속성값을 이용하면 에니메이션이 적용되는 화면상의 범위와 에니메이션 자체의 적용되는 시간을 동기화 시킬수있다. (true 값적용 )
    - pin 속성값을 사용하여 특정구간에서 해당요소를 스크롤되지 않게 고정 시킬수 있다. 
     (css position:sticky 속성값과 같은 개념 - sticky 속성에서 고정되는 시간은 부모요소의 높이값을 인위적으로 적용해야하지만, pin 속성은 부모의 높이값 조절없이 end 속성으로 조절가능)

       
    
    작업개요 1  - 부모요소와 상관없이 에니메이션 객체 각각 trigger 제어 ( trigger 대상, 에니메이션 스크롤 범위, 기준좌표, scrub, pin 각각적용 )

    - 첫번째 박스 에니메이션에 scrollTrigger 속성을 적용하여 기본사용 문법과 여러가지 trigger 속성제어 
    - 각 에니메이션 객체에 scrollTrigger 속성을 각각 적용 ( trigger 대상, 에니메이션 스크롤 범위, 기준좌표, scrub, pin 각각적용 )
   
    

    */ 
      

    document.addEventListener('DOMContentLoaded',()=>{ 

        const box1=document.querySelector('#box_1')
        
        let endX=document.documentElement.clientWidth-box1.offsetWidth; // box 에니메이션이 끝나는 자표 (스크롤을 제외한 윈도우 안쪽크기- box가로크기 )
        //alert(endX)

        gsap.to('#box_1',{x:endX, duration:1, ease:'power1.out', scrollTrigger:{ 
            // gsap.to 속성중의 scrollTrigger 적용 
            trigger:'#box_1', // trigger 대상을 각 에니메이션객체 자신으로 적용 
            markers:true,
            start:'top 50%', // 'trigger대상의 에니메이션 시작기준좌표(top,center,bottom,%,px)  윈도우화면(viewport)의 에니메이션 시작좌표 ' 
            end:'bottom 20%', //'trigger대상의 에니메이션 종료기준좌표(top,center,bottom,%,px - **중요 에니메이션이 유지시간결정**)  윈도우화면(viewport)의 에니메이션 종료좌표 ' 
            // 종료시 특별한명령(toggleActions)을 주지않으면 적용안됨           
            toggleActions:'play reverse play reverse', // enter(위로 진입) leave(위로 종료) enterback(아래로 진입) leaveback(아래로 종료)
            // 스크롤 상황에 따라 에니메이션을 다양하게 전환 시키면서 적용가능 ( none, play, pause, resume, reverse, restart, reset, complete)
            toggleClass:'activate', // 스크롤 상황에 따라 css 스타일 class속성값 적용해제 
            scrub:1, // 에니메이션이 활성화되는 화면상의 스크롤범위와 에니메이션 자체의 적용되는 시간을 동기화 시킬수있다. (true 실시간동기화, 숫자 값이 클수록 부드러움 )
            // scrub값을 적용하면 toggleActions 값 이나 duration (에니메이션시간) 값은 무시 
            pin:true // pin 값을 적용하면 에니메이션이 활성화되는 스크롤범위내에서 스크롤 고정 (true, pin대상적용)
            // pin값을 적용하지 않고 scrub (동기화) 값으로 에니메이션이 진행되면 스크롤 되면서 에니메이션 ( 좋지않음 )
            // 중요) pin값이 적용되면 에니메이션 대상은 스크롤이 고정되지만 기준좌표값은 계속 스크롤되어 에니메이션을 제어 
        }})

    })

    

    


</script>


</head>
<body>
   

        <div id="contents_1">

           

        </div>

        <div id="contents_2">

            <div class="box" id="box_1">
                box_1
            </div>         
           

        </div>

        <div id="contents_3">





        </div>






        

    

    
    
</body>
</html>
