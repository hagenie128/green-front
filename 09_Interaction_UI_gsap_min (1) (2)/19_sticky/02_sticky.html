<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans&display=swap" rel="stylesheet">
    <script src='https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js'></script>
    <title>sticky02</title>
    <style>
        *{
            margin:0px;
            padding:0px; 
        }
        ul,li{
            list-style:none;
        }

        div#visual_wrap{
            width:100%;
            height:600px; 
            background:url('./images/visual_img.jpg') no-repeat center center;
            position:relative;
            left:0px; 
            top:0px; 
                
        }
        div#visual_text_wrap{
            width:1200px; 
            height:200px;   
            position:absolute;
            left:50%;
            margin-left:-600px;
            top:260px;    
        }
        p#visual_title{
            width:100%;
            margin-bottom:24px; 
            font:normal 68px/60px 'Noto Sans';
            text-align:center; 
            color:white;    
        }
        p#visual_text{
            font:normal 14px/21px 'Noto Sans';
            text-align:center; 
            color:white; 
            width:40%;
            margin:0px auto; 
            opacity:0.8;
            
        }
      
        div#mainmenu_wrap{
            width:100%;
            height:80px; 
            background:rgba(255,255,255,0.5);
            
            position:sticky; /* 스크롤시 윈도우에 고정 */
            left:0px; 
            top:0px; /*윈도우에 고정되는 상단좌표지정 주의) 현제 메뉴바의 위치가 아님 */
            margin-top:-80px; /* 메뉴바의 위치를 비쥬얼하단과 겹치게 margin-top 값으로 적용 */
            transition:0.5s ease-out;
                   
        }
        div#mainmenu_wrap.activate{ /*메뉴바 활성화 속성정의 */
            background:rgba(238,45,80,1);
        }
        nav#mainmenu{
            width:1200px; 
            height:100%;
            margin:0px auto;
        }
        ul#mainmenu_list{
            width:100%;
            height:100%;            
        }
        ul#mainmenu_list>li{
            width:25%;
            height:100%;
            float:left;
            font:normal 18px/80px 'verdana';
            text-align:center;
            color:white;
        }
        div#contents_wrap{
            width:100%;
            min-height:2000px; 
            background:#ECECEB;
        }

    </style>

    <script>

        document.addEventListener('DOMContentLoaded',()=>{

            const visualWrap=document.querySelector('#visual_wrap')
            const visualTextWrap=document.querySelector('#visual_text_wrap') // 비쥬얼 텍스트 박스 저장 
            const mainMenuWrap=document.querySelector('#mainmenu_wrap') // 메뉴바 저장 

            window.addEventListener('scroll', scrollWindow) // window 스크롤시 scrollWindow() 함수실행 

            function scrollWindow(){

                let scrollHeight=window.pageYOffset;  // window 스크롤시 스크롤된 높이 저장 
                
                if(scrollHeight>=100){ // 스크롤된 높이값이 100px 넘으면 (임의로 지정) 텍스크박스가 작아지면서 사라지는 모션 
                    gsap.to(visualTextWrap, {scale:0, opacity:0, duration:0.3, ease:'power1.out'})
                }else{
                    gsap.to(visualTextWrap, {scale:1, opacity:1, duration:0.3, ease:'power1.out'})
                }

                let snapY=visualWrap.offsetHeight-mainMenuWrap.offsetHeight
                // 메뉴바가 window 좌표에 고정되는 시점의 scrollHeight 값을 구함 (비쥬얼전체높이 600px - 메뉴바의 높이( 메뉴바가 겹쳐있슴) 80px  )

                if(scrollHeight>=snapY){ // 현제 스크롤 되고 있는 높이가 고정되는 시점의 scrollHeight 값보다 커질때
                    mainMenuWrap.classList.add('activate') // 메뉴바 활성화 컬러 적용 
                }else{
                    mainMenuWrap.classList.remove('activate') // 메뉴바 비활성화 컬러 적용 
                }
            }
        })

        
    </script>
</head>
<body>
   
        <div id="visual_wrap">
            <div id="visual_text_wrap">
                <p id="visual_title">Gateway of communication</p>
                <p id="visual_text"> We are working with thousands of business companies around
                    the world & delivering ideas for your business
                </p>
              

            </div>
        </div>
        <div id="mainmenu_wrap">
            <nav id="mainmenu">
                <ul id="mainmenu_list">
                    <li>Home</li>
                    <li>About</li>
                    <li>Product</li>
                    <li>Email</li>
                </ul>
            </nav>

        </div>
        <div id="contents_wrap">







        </div>
    
    
</body>
</html>
