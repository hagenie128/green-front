<!doctype html>
<html>
	<head>
		<meta charset="UTF-8"> 
		<meta name="viewport" content="width=device-width, initial-scale=1.0">  
		<title>Column Drop</title>

		<style>

		body,p{
			margin:0px; padding:0px; 
		}
		html,body{
			height:100%;
		}
		div#wrap{
			width:100%; height:100%; position:relative; 
		}
		header#header{
			width:300px; height:100%; float:left; margin-right:10px; background:#cccccc; color:white;
		}
		section#contents{
			margin:0px 310px 0px 310px; width:auto; height:100%; background: #aaaaaa; color:white; 
		}
		section#side{
			width:300px; height:100%; margin-left:10px; position:absolute; right:0px; background:#cccccc; top:0px; color:white;
		}
		
		@media screen and (max-width:1200px){
			section#side{
				position:relative; left:0px; top:0px;  width:auto; height:200px; margin-left:0px;  margin-top:10px; 
			}
			section#contents{
				margin-right:0px; 
			}
		}
		@media screen and (max-width:980px){		
			header#header{
				float:none; width:100%; height:200px; margin-bottom:10px; 
			}
			section#contents{
				margin-left:0px; 
			}	
		}

		</style>

	</head>

	<body>
		
			<div id="wrap">
					
					<header id="header">    
							header    
					</header>
					
					<section id="contents">    
							contents    
					</section>
					
					<section id="side">   
							side    
					</section>    
					
			</div>
	
	</body> 
 </html>
