// 함수사용  

function checkEvenOdd(){ 

  let num=prompt("숫자를 입력하세요");  

  num=parseInt(num)

  if(num%2==0){ 

    document.write(" 짝수입니다.")

  }else{

    document.write(" 홀수입니다.")

  }

}

checkEvenOdd();  // 함수호출
