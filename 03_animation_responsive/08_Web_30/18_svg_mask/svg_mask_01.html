<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0">   
  <title>제목표시줄에출력될내용</title>
  <style>

   *{
    margin:0px;
    padding:0px; 
   }


   div#movie_wrap{


    width:1536px;
    height:864px;
    position:absolute;
    left:50%;
    margin-left:-768px; 
    top:50%;
    margin-top:-432px;     

     /* 
       mask-image 속성사용 -크로스브라우징 주의 (-webkit- 사용  chrome, firefox, IE edge 사용가능 ) 
       마스크씌울 이미지의 투명한 부분을 가려주고 그래픽이 채워진부분을 마스크로 보여주는 원리 (png, svg 가능 ) 
       mask_text.svg 파일제작 (피그마에서 폰트 Anton 300px reguler ** 프레임을 제외한 텍스트 부분만 저장 **)          
      */

    -webkit-mask-image:url('./mask_text.svg'); /* 마스크 씌울 외부 svg 파일을 불러들임 */
    -webkit-mask-repeat:no-repeat;
    -webkit-mask-position:center center; 
    -webkit-mask-size:1272px 452px; /* 마스크객체크기와 동일하게 적용 */

   }


  </style>
</head>
<body>
  


  <div id="movie_wrap">

    <embed id="movie" width="1536" height="864" src="https://www.youtube.com/embed/11cta61wi0g?autoplay=1&mute=1&controls=0&start=10" title="NewJeans (뉴진스) &#39;Hype Boy&#39; Official MV (Performance ver.1)" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></embed>

  </div>
 






</body>
</html>
