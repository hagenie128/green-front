<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">   
    <title>fontawesome_1</title>
    
    <!-- <link rel="stylesheet" href="fontawesome-free-5.12.1-web/css/all.css"> 소스로컬연결 ( 용량 많음 ) -->
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.12.1/css/all.min.css'/>
    <!-- CDN 코드로 바로연결 ( 용량 최적화 ) -->

    <style>  

      .fa-adobe{
        font-size:200px; color:orange; /* css 속성값으로 크기 및 색상등 다양한 속성 조절이 가능 */
        position:absolute; left:300px; top:200px; padding:0px 10px;
        box-shadow:5px 5px 20px gray;  
      }
                          
    </style>


  </head>   
  
  <body>  

    <i class="fab fa-adobe fa-9x"></i>
    <!-- <i> 테그를 복사하여 class 이름으로 불러들인 외부스타일 소스에서 아이콘을 적용 -->
    <!-- fa-배수x 형식으로 class 명을 추가하여 아이콘의 기본크기 조절 (2x, 3x, 5x, 7x, 9x )-->
      

  </body>
</html>
