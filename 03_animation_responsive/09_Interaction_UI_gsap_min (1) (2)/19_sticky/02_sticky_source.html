<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans&display=swap" rel="stylesheet">
    <script src='https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js'></script>
    <title>sticky02</title>
    <style>
        *{
            margin:0px;
            padding:0px; 
        }
        ul,li{
            list-style:none;
        }

        div#visual_wrap{
            width:100%;
            height:600px; 
            background:url('./images/visual_img.jpg') no-repeat center center;
            position:relative;
            left:0px; 
            top:0px; 
                
        }
        div#visual_text_wrap{
            width:1200px; 
            height:200px;   
            position:absolute;
            left:50%;
            margin-left:-600px;
            top:260px;    
        }
        p#visual_title{
            width:100%;
            margin-bottom:24px; 
            font:normal 68px/60px 'Noto Sans';
            text-align:center; 
            color:white;    
        }
        p#visual_text{
            font:normal 14px/21px 'Noto Sans';
            text-align:center; 
            color:white; 
            width:40%;
            margin:0px auto; 
            opacity:0.8;
            
        }
      
        div#mainmenu_wrap{
            width:100%;
            height:80px; 
            background:rgba(255,255,255,0.5);
            
            position:sticky; /* 스크롤시 윈도우에 고정 */
            left:0px; 
            top:0px; /*윈도우에 고정되는 상단좌표지정 주의) 현제 메뉴바의 위치가 아님 */
            margin-top:-80px; /* 메뉴바의 위치를 비쥬얼하단과 겹치게 margin-top 값으로 적용 */
            transition:0.5s ease-out;
                   
        }
        div#mainmenu_wrap.activate{ /*메뉴바 활성화 속성정의 */
            background:rgba(238,45,80,1);
        }
        nav#mainmenu{
            width:1200px; 
            height:100%;
            margin:0px auto;
        }
        ul#mainmenu_list{
            width:100%;
            height:100%;            
        }
        ul#mainmenu_list>li{
            width:25%;
            height:100%;
            float:left;
            font:normal 18px/80px 'verdana';
            text-align:center;
            color:white;
        }
        div#contents_wrap{
            width:100%;
            min-height:2000px; 
            background:#ECECEB;
        }

    </style>

    <script>
        document.addEventListener('DOMContentLoaded',()=>{
            const visualWrap=document.querySelector('#visual_wrap')
            const visualText=document.querySelector('#visual_text_wrap')
            const mainMenu=document.querySelector('#mainmenu_wrap')
            // 메뉴가 윈도우에 붙는 위치 구하기=집-메뉴
            let snapY=visualWrap.offsetHeight-mainMenu.offsetHeight

            window.addEventListener('scroll', scrollWindow)

            function scrollWindow(){
                let scrollHeight=window.pageYOffset
                if(scrollHeight>=100){
                    gsap.to(visualText,{scale:0, opacity:0, duration:0.8, ease:'power1.out'})
                }else{
                    gsap.to(visualText,{scale:1,opacity:1, duration:0.8, ease:'power1.out'})
                }
                // 스크롤한 높이가 메뉴가 붙는 높이보다 크거나 작다면
                if(scrollHeight>=snapY){
                    mainMenu.classList.add('activate')
                }else{
                    mainMenu.classList.remove('activate')
                }
            }
        })

        








        
    </script>
</head>
<body>
   
        <div id="visual_wrap">
            <div id="visual_text_wrap">
                <p id="visual_title">Gateway of communication</p>
                <p id="visual_text"> We are working with thousands of business companies around
                    the world & delivering ideas for your business
                </p>
              

            </div>
        </div>
        <div id="mainmenu_wrap">
            <nav id="mainmenu">
                <ul id="mainmenu_list">
                    <li>Home</li>
                    <li>About</li>
                    <li>Product</li>
                    <li>Email</li>
                </ul>
            </nav>

        </div>
        <div id="contents_wrap">







        </div>
    
    
</body>
</html>
