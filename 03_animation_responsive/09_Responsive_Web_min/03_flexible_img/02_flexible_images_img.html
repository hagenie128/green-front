<!doctype html>
<html>
	<head>
		<meta charset="UTF-8"> 
  	<meta name="viewport" content="width=device-width, initial-scale=1.0">   
		<title>FlexibleImage_img</title>

		<style>
			body,p{
				margin:0px; padding:0px; 
			}			
			div#visual_wrap{
				width:100%; 
			}
			section#visual{
				width:70%; margin:100px auto;
			}
			section#visual img{		
				width:100%;
			}
		</style>
	</head>

<body>
	
    <div id="visual_wrap">
    	<section id="visual">
        	<img src="images/visual.jpg" alt="">        
      </section>     
    </div>

</body>
</html>
